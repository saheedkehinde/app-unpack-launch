<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TIMAK CENTRE — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 260px; height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,238,154,0.15), rgba(184,138,46,0.08), transparent 70%);
      pointer-events: none;
    }
    .icon {
      position: relative; z-index: 1;
      width: 64px; height: 64px;
      margin-bottom: 1.5rem;
    }
    .icon svg { width: 100%; height: 100%; }
    h1 {
      position: relative; z-index: 1;
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffee9a, #b88a2e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.75rem;
    }
    p {
      position: relative; z-index: 1;
      color: rgba(255,255,255,0.6);
      font-size: 0.95rem;
      max-width: 320px;
      line-height: 1.5;
      margin-bottom: 2rem;
    }
    button {
      position: relative; z-index: 1;
      background: linear-gradient(135deg, #ffee9a, #b88a2e);
      color: #1a0a0a;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="icon">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#b88a2e">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
    </svg>
  </div>
  <h1>You're Offline</h1>
  <p>It seems you've lost your internet connection. Please check your network and try again.</p>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
